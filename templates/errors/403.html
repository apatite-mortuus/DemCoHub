{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="error-container text-center">
        <div class="error-code animate__animated animate__fadeInUp">
            <h1 class="display-1 fw-bold text-danger">403</h1>
        </div>

        <div class="error-content animate__animated animate__fadeInUp animate__delay-1s">
            <div class="error-icon mb-4">
                <i class="bi bi-shield-lock display-1 text-muted"></i>
            </div>

            <h2 class="mb-3">Доступ запрещен</h2>

            <p class="text-muted mb-3">
                У вас нет прав для доступа к этой странице или выполнения данного действия.
            </p>

        </div>
    </div>
</div>
{% endblock %}
